<div class="text-gray-700 text-2xl shadow-xl/30 w-2xl h-auto px-2 py-2">
  <p>First name: {{ user.first_name }}</p>
  <p>Last name: {{ user.last_name }}</p>
  <p>Email: {{ user.email }}</p>
  <p>Country: {{ user.country|default_if_none:'-' }}</p>
  <p>City: {{ user.city|default_if_none:'-' }}</p>
  <p>Address: {{ user.address|default_if_none:'-' }}</p>
  <p>Postal code: {{ user.postal_code|default_if_none:'-' }}</p>
</div>
