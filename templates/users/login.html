{% extends 'base.html' %}

{% block content %}
  <div class="h-screen flex items-center justify-center">
    <form action="{% url 'users:login' %}" method="post" class="shadow-xl/30 mx-w-2xl px-3 py-3">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ requets.GET.next }}" />
      <div class="grid sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-2 lg:gap-5 mb-5">
        <div>{{ form.username }}</div>
        <div>{{ form.password }}</div>
      </div>
      <div class="grid sm:grid-cols-1 md:grid-cols-2 md:gap-5 lg:grid-cols-2 gap-2 lg:gap-5">
        <button type="submit" class="text-center text-lg py-3 border-2 border-gray-900 hover:text-gray-200 hover:bg-gray-900 transition-colors duration-700">Log in</button>
        <a href="{{ request.GET.next }} " class="text-center text-lg py-3 border-2 border-gray-900 hover:text-gray-200 hover:bg-gray-900 transition-colors duration-700">Back</a>
      </div>
    </form>
  </div>
{% endblock %}
