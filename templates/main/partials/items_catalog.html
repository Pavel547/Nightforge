<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-2 md:gap-5">
  {% for product in products %}
    <div class="hover:shadow-xl/30 transition-shadow duration-700 md:px-3 py-3 lg:px-3 lg:py-3">
      <a href="{% url 'main:product' product.slug %}">
        <div class="w-full">
          {% if product.main_image %}
            <img src="{{ product.main_image.url }}" alt="{{ product.name|upper }} image" class="w-full object-cover" />
          {% else %}
            <div class="flex items-center justify-center h-48 bg-gray-100">
              <span class="text-2xl text-gray-500">Image not found</span>
            </div>
          {% endif %}
        </div>
        <div class="mt-3">
          <p class="text-xl md:text-2xl text-gray-900">{{ product.name }}</p>
          <p class="text-xl text-gray-900">{{ product.price }} €</p>
        </div>
      </a>
    </div>
  {% endfor %}
</div>
